<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- SEO Meta Tags -->
    <title>BookXchange - Online Book Exchange Platform</title>
    <meta name="description"
        content="Connect with readers everywhere. Trade books you've finished for ones you want to read on BookXchange." />

    <style>
        /* Splash Screen Styles for Minimalistic Theme */
        body,
        html {
            margin: 0;
            padding: 0;
            background-color: #fafafa;
        }

        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #fafafa;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            overflow: hidden;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
        }

        .splash-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2.5rem 4rem;
            display: flex;
            justify-content: flex-end;
            box-sizing: border-box;
            gap: 1.5rem;
            opacity: 0;
            animation: fadeIn 1s forwards 1.2s;
        }

        .splash-btn {
            font-family: 'Outfit', sans-serif;
            text-decoration: none;
            padding: 0.75rem 2.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .btn-login {
            color: #1a1a1a;
            background: transparent;
            border: 1px solid #e5e5e5;
        }

        .btn-login:hover {
            border-color: #1a1a1a;
        }

        .btn-register {
            color: #ffffff;
            background: #1a1a1a;
            border: 1px solid #1a1a1a;
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .btn-register:hover {
            background: #333333;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(0, 0, 0, 0.6);
        }

        .splash-content {
            text-align: center;
            transform-style: preserve-3d;
        }

        .splash-title-container {
            perspective: 1500px;
            margin-bottom: 3rem;
        }

        .splash-title {
            font-family: 'Outfit', sans-serif;
            font-size: 5vw;
            font-weight: 800;
            color: #1a1a1a;
            margin: 0;
            letter-spacing: -1px;
            line-height: 1.1;
            /* 3D Pop Animation */
            opacity: 0;
            transform: rotateX(-90deg) translateZ(-500px);
            animation: pop3D 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0.2s;
        }

        .splash-title span {
            background: linear-gradient(135deg, #1a1a1a, #666666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .splash-features {
            display: flex;
            gap: 2.5rem;
            justify-content: center;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUpFade 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards 1.4s;
        }

        .feature-item {
            font-family: 'Outfit', sans-serif;
            background: #ffffff;
            padding: 1.5rem 2.5rem;
            border-radius: 12px;
            color: #4a4a4a;
            font-weight: 500;
            font-size: 1.1rem;
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.08);
            border: 1px solid #f0f0f0;
            transition: transform 0.3s ease;
        }

        .feature-item:hover {
            transform: translateY(-5px);
        }

        @keyframes pop3D {
            0% {
                opacity: 0;
                transform: rotateX(-90deg) translateZ(-500px) scale(0.5);
            }

            60% {
                opacity: 1;
                transform: rotateX(15deg) translateZ(50px) scale(1.05);
            }

            100% {
                opacity: 1;
                transform: rotateX(0deg) translateZ(0) scale(1);
            }
        }

        @keyframes slideUpFade {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* 3D Book Animation Container in Splash */
        .splash-book-container {
            width: 140px;
            height: 200px;
            margin: 0 auto 4rem auto;
            perspective: 1200px;
            opacity: 0;
            animation: pop3D 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards 0s;
        }

        .splash-book {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite, rotateBook 12s infinite linear;
        }

        .book-face {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 4px 16px 16px 4px;
        }

        .book-front {
            transform: translateZ(15px);
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            border: 1px solid #333;
        }

        .book-front::before {
            content: 'BookXchange';
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .book-back {
            transform: rotateY(180deg) translateZ(15px);
            background: #111111;
        }

        .book-spine {
            width: 30px;
            height: 100%;
            top: 0;
            left: -15px;
            transform: rotateY(-90deg) translateZ(15px);
            background: #000000;
            border-radius: 4px 0 0 4px;
        }

        .book-pages {
            width: 95%;
            height: 96%;
            top: 2%;
            left: 2%;
            transform: translateZ(0);
            background: #f0f0f0;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        @keyframes rotateBook {
            0% {
                transform: rotateY(0deg) rotateX(15deg);
            }

            100% {
                transform: rotateY(360deg) rotateX(15deg);
            }
        }

        @keyframes float {

            0%,
            100% {
                top: 0;
            }

            50% {
                top: -20px;
            }
        }
    </style>
</head>

<body>
    <div id="splash-screen">
        <div class="splash-header">
            <a href="/login" class="splash-btn btn-login">Login</a>
            <a href="/register" class="splash-btn btn-register">Register</a>
        </div>
        <div class="splash-content">
            <div class="splash-book-container">
                <div class="splash-book">
                    <div class="book-face book-pages"></div>
                    <div class="book-face book-spine"></div>
                    <div class="book-face book-back"></div>
                    <div class="book-face book-front"></div>
                </div>
            </div>
            <div class="splash-title-container">
                <h1 class="splash-title">Online <span>Book Exchange</span> Platform</h1>
            </div>
            <div class="splash-features">
                <div class="feature-item">List & Discover</div>
                <div class="feature-item">Connect & Trade</div>
                <div class="feature-item">Read & Repeat</div>
            </div>
        </div>
    </div>

    <div id="root"></div>

    <script>
        // Only show splash screen on the root path, and fade it out
        // allowing the React application to become visible.
        window.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splash-screen');
            if (window.location.pathname === '/') {
                // Wait for the animation to be fully appreciated, then fade out
                setTimeout(() => {
                    splash.style.opacity = '0';
                    setTimeout(() => {
                        splash.style.visibility = 'hidden';
                        splash.style.display = 'none';
                    }, 800);
                }, 4500);
            } else {
                splash.style.display = 'none';
            }
        });
    </script>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
